name: CodeCov

on: [push, pull_request]

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13' ]
        requirements-file: [
          dj42_cms41.txt,
          dj42_cms50.txt,
          dj52_cms50.txt,
          dj52_cms50_versioning.txt,
          dj60_cms51.txt,
          dj60_cms51_versioning.txt,
          dj61_cms51.txt,
        ]
        os: [
          ubuntu-26.04,
        ]
        include:
          - python-version: '3.9'
            requirements-file: dj42_cms41.txt
            os: ubuntu-24.04
        exclude:
          - python-version: '3.13'
            requirements-file: dj42_cms41.txt
          - python-version: '3.10'
            requirements-file: dj52_cms50_versioning.txt
          - python-version: '3.10'
            requirements-file: dj60_cms51.txt
          - python-version: '3.10'
            requirements-file: dj60_cms51_versioning.txt
          - python-version: '3.10'
            requirements-file: dj61_cms51.txt
          - python-version: '3.11'
            requirements-file: dj60_cms51.txt
          - python-version: '3.11'
            requirements-file: dj60_cms51_versioning.txt
          - python-version: '3.11'
            requirements-file: dj61_cms51.txt

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements/${{ matrix.requirements-file }}
        pip install -e .
    - name: Run coverage
      run: coverage run -m pytest
      env:
        VERSIONING: ${{ contains(matrix.requirements-file, 'versioning') && '1' || '' }}

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v6
