[tox]
envlist =
    lint
    py{35,36,37,38}-dj{22}-cms{37,38}
    py{36,37,38}-dj{30}-cms{37,38}
    py{36,37,38}-dj{31}-cms{38}

skip_missing_interpreters=True

[testenv]
deps =
    -r{toxinidir}/tests/requirements/base.txt
    dj22: Django>=2.2,<3.0
    dj30: Django>=3.0,<3.1
    dj31: Django>=3.1,<3.2
    cms37: django-cms>=3.7,<3.8
    cms38: django-cms>=3.8,<3.9
commands =
    {envpython} --version
    coverage erase
    coverage run tests/settings.py
    coverage report

[testenv:lint]
deps = ruff
commands =
    ruff check djangocms_history
    ruff format --check djangocms_history
skip_install = true
