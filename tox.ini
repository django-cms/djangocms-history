[tox]
envlist =
    ruff
    py{39,310,311,312}-dj42-cms41
    py{310,311,312}-dj50-cms41
    py{310,311,312,313}-dj42-cms50
    py{310,311,312,313}-dj52-cms50
    py{311,312,313}-dj52-cms50-versioning
    py{312,313}-dj60-cms51
    py{312,313}-dj60-cms51-versioning

skip_missing_interpreters=True

[testenv]
deps =
    -r{toxinidir}/tests/requirements/base.txt
    dj42: Django>=4.2,<5.0
    dj50: Django>=5.0,<5.1
    dj51: Django>=5.1,<5.2
    dj52: Django>=5.2,<6.0
    cms41: django-cms>=4.1,<5.0
    cms50: django-cms>=5.0,<5.1
    versioning: djangocms-versioning>=2.4
setenv =
    versioning: VERSIONING=1
commands =
    {envpython} --version
    {env:COMMAND:coverage} erase
    {env:COMMAND:coverage} run -m pytest
    {env:COMMAND:coverage} report

[testenv:ruff]
deps = ruff
commands = ruff check djangocms_history tests
skip_install = true
